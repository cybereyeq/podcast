<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberEyeQ Weekly Podcast</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="alternate" type="application/rss+xml" title="CyberEyeQ Weekly Podcast" href="feed.xml">
<style>
  :root { color-scheme: light dark; --bg:#0f172a; --fg:#f8fafc; --accent:#22d3ee; --muted:#94a3b8; }
  body { font: 16px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--fg); margin:0; padding:2rem; max-width:720px; margin-inline:auto; }
  h1 { color: var(--accent); margin: 0 0 .25rem; font-size: 2.2rem; }
  h2 { color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: .25rem; margin-top: 2rem; }
  .sub { color: var(--muted); margin-bottom: 1.5rem; }
  .episode { border: 1px solid #334155; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; background:#1e293b; }
  .episode h3 { margin: 0 0 .5rem; color: var(--fg); }
  .meta { color: var(--muted); font-size: .9rem; margin-bottom: .5rem; }
  audio { width: 100%; margin-top: .5rem; }
  .feed { background: #1e293b; border: 1px solid var(--accent); border-radius: 8px; padding: 1rem; margin-bottom: 2rem; }
  code { background: #0f172a; padding: .2rem .4rem; border-radius: 4px; font-size: .9em; }
  a { color: var(--accent); }
</style>
</head>
<body>
  <img src="cover.jpg" alt="CyberEyeQ Weekly Podcast cover" style="width:200px;float:right;margin-left:1rem;border-radius:8px;">
  <h1>CyberEyeQ Weekly Podcast</h1>
  <p class="sub">10-minute weekly briefings on the regulatory stories that actually matter.</p>

  <div class="feed">
    Subscribe: <a href="feed.xml">RSS feed</a> ·
    Point your podcast app, beehiiv external-RSS show, or any aggregator at <code>feed.xml</code>.
  </div>

  <h2>Episodes</h2>
  <div id="episodes">Loading…</div>

  <script>
    fetch('podcast/episodes.json').then(r => r.json()).then(data => {
      const container = document.getElementById('episodes');
      const eps = data.episodes.slice().sort((a,b) => b.number - a.number);
      container.innerHTML = eps.map(ep => `
        <div class="episode">
          <h3>${ep.title}</h3>
          <div class="meta">${ep.date} · Episode ${ep.number}</div>
          <p>${ep.summary}</p>
          <audio controls preload="none" src="podcast/episodes/${ep.filename}"></audio>
        </div>
      `).join('');
    }).catch(() => {
      document.getElementById('episodes').textContent = 'Could not load episode list.';
    });
  </script>
</body>
</html>
